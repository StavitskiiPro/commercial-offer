<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stavitskii PRO | Premium Interior</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --accent: #00ffc3; --gold: #ffd700; --bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: #eee; display: flex; min-height: 100vh; background: var(--bg); overflow-x: hidden; }
        
        .main-wrapper { flex: 1; padding: 5vw; max-width: 900px; background: linear-gradient(135deg, #0a0a0a 0%, #141414 100%); }
        
        /* Side Image (HEAD) с пульсацией */
        .side-image { 
            width: 35%; background: url('https://i.ibb.co/Q3YWcLTs/image.jpg') center/cover; 
            position: sticky; top: 0; height: 100vh; 
            animation: intense-pulse 4s infinite alternate ease-in-out;
            will-change: transform, filter;
        }
        @keyframes intense-pulse { 0% { filter: brightness(1) saturate(1); } 100% { filter: brightness(1.2) saturate(1.2); box-shadow: 0 0 50px rgba(0,255,195,0.2); } }
        
        .hero { margin-bottom: 50px; }
        .hero h1 { font-size: clamp(35px, 7vw, 60px); margin-bottom: 10px; }
        .hero h1 span { color: var(--accent); }
        
        .table-section { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; margin-bottom: 40px; }
        table { width: 100%; border-collapse: collapse; }
        tr { display: flex; justify-content: space-between; padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .price-col { font-weight: 700; color: var(--accent); }
        .total-highlight { 
            color: var(--gold) !important; font-size: 1.3em; border-top: 1px solid rgba(255,215,0,0.2) !important; margin-top: 10px;
            text-shadow: 0 0 15px rgba(255,215,0,0.5); animation: glow 1.5s infinite alternate;
        }
        @keyframes glow { from { text-shadow: 0 0 10px rgba(255,215,0,0.4); } to { text-shadow: 0 0 20px rgba(255,215,0,0.8); } }
        
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .mat-card { background: #111; border-radius: 20px; border: 1px solid #222; overflow: hidden; transition: 0.4s; cursor: pointer; }
        .mat-card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .mat-card img { width: 100%; height: 200px; object-fit: cover; }
        .label { padding: 15px; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; text-align: center; color: #888; }
        
        /* Премиум Модальное окно */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; perspective: 1200px; opacity: 0; transition: opacity 0.4s ease; }
        #modal.active { display: flex; opacity: 1; }
        #modal img { 
            max-width: 100%; max-height: 85vh; border-radius: 20px;
            transform: rotateX(20deg) scale(0.8); 
            transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }
        #modal.active img { transform: rotateX(0deg) scale(1); }
        
        footer { margin-top: 60px; text-align: center; color: #555; font-size: 0.75rem; border-top: 1px solid #222; padding-top: 20px; }
        
        @media (max-width: 900px) { body { flex-direction: column; } .side-image { width: 100%; height: 300px; order: -1; animation: none; } }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="hero animate__animated animate__fadeInDownBig">
            <h1>Stavitskii <span>PRO</span></h1>
            <p>Эксклюзивное производство интерьерных элементов</p>
        </div>
        
        <div class="table-section animate__animated animate__fadeInUp">
            <table>
                <tr><td><strong>Лайтбокс</strong></td><td class="price-col">326 480 ₽</td></tr>
                <tr><td><strong>Барная столешница (Кварц)</strong></td><td class="price-col">343 970 ₽</td></tr>
                <tr><td><strong>Оформление стойки (Металл)</strong></td><td class="price-col">390 610 ₽</td></tr>
                <tr class="total-highlight"><td><strong>ИТОГО</strong></td><td class="price-col">1 061 060 ₽</td></tr>
            </table>
        </div>
        <div class="cards-grid">
            <div class="mat-card animate__animated animate__fadeInUp" onclick="openModal('https://i.ibb.co/xtB3s4fc/1.jpg')"><img src="https://i.ibb.co/xtB3s4fc/1.jpg"><div class="label">Лайтбокс</div></div>
            <div class="mat-card animate__animated animate__fadeInUp" onclick="openModal('https://i.ibb.co/VcZTVs4C/AR122-INT2.jpg')"><img src="https://i.ibb.co/VcZTVs4C/AR122-INT2.jpg"><div class="label">Барная столешница</div></div>
            <div class="mat-card animate__animated animate__fadeInUp" onclick="openModal('https://i.ibb.co/RT67QXZf/image.jpg')"><img src="https://i.ibb.co/RT67QXZf/image.jpg"><div class="label">Металлоконструкции</div></div>
        </div>
        <footer>Stavitskii PRO — сделано для людей | 2026</footer>
    </div>
    
    <div class="side-image animate__animated animate__fadeInRightBig"></div>
    <div id="modal" onclick="closeModal()">
        <img id="modalImg" src="">
    </div>
    <script>
        function openModal(src) { document.getElementById('modalImg').src = src; document.getElementById('modal').classList.add('active'); }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }
    </script>
</body>
</html>
