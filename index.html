<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stavitskii PRO | Proposal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --accent: #00ffc3; --bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: #fff; background: var(--bg); display: flex; min-height: 100vh; overflow-x: hidden; }
        
        .main-wrapper { flex: 1; padding: 80px 5vw; max-width: 800px; display: flex; flex-direction: column; }
        .side-image { width: 40%; height: 100vh; position: sticky; top: 0; background: url('https://i.ibb.co/Q3YWcLTs/image.jpg') center/cover; }
        
        h1 { font-size: 2.5rem; margin-bottom: 40px; letter-spacing: -2px; }
        span { color: var(--accent); }
        table { width: 100%; border-collapse: collapse; margin-bottom: 60px; }
        tr { border-bottom: 1px solid #1a1a1a; transition: 0.3s; }
        td { padding: 25px 0; font-size: 1.1rem; }
        .price { text-align: right; font-weight: 700; color: var(--accent); }
        .total { border-bottom: none; font-size: 1.5rem; }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .photo { aspect-ratio: 1; overflow: hidden; border-radius: 12px; cursor: pointer; background: #111; }
        .photo img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .photo:hover img { transform: scale(1.15); }
        footer { margin-top: auto; padding-top: 60px; text-align: center; color: #555; font-size: 0.8rem; }
        /* Премиум-анимация модалки */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); z-index: 1000; align-items: center; justify-content: center; padding: 40px; opacity: 0; transition: opacity 0.4s ease; }
        #modal.active { display: flex; opacity: 1; }
        #modal img { 
            max-width: 100%; max-height: 90vh; border-radius: 8px; 
            transform: scale(0.8) translateY(50px); 
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }
        #modal.active img { transform: scale(1) translateY(0); }
        @media (max-width: 900px) { body { flex-direction: column; } .side-image { height: 40vh; order: -1; } .main-wrapper { padding: 40px 20px; } }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <h1 class="animate__animated animate__fadeInDown">Stavitskii <span>PRO</span></h1>
        
        <table class="animate__animated animate__fadeInUp">
            <tr><td>Лайтбокс</td><td class="price">326 480 ₽</td></tr>
            <tr><td>Барная столешница (Кварц R 122 Алмазы Якутии)</td><td class="price">343 970 ₽</td></tr>
            <tr><td>Оформление стойки (Металл)</td><td class="price">390 610 ₽</td></tr>
            <tr class="total"><td>ИТОГО</td><td class="price">1 061 060 ₽</td></tr>
        </table>
        <div class="gallery">
            <div class="photo animate__animated animate__zoomIn" style="animation-delay: 0.2s" onclick="openModal('https://i.ibb.co/xtB3s4fc/1.jpg')"><img src="https://i.ibb.co/xtB3s4fc/1.jpg"></div>
            <div class="photo animate__animated animate__zoomIn" style="animation-delay: 0.3s" onclick="openModal('https://i.ibb.co/VcZTVs4C/AR122-INT2.jpg')"><img src="https://i.ibb.co/VcZTVs4C/AR122-INT2.jpg"></div>
            <div class="photo animate__animated animate__zoomIn" style="animation-delay: 0.4s" onclick="openModal('https://i.ibb.co/RT67QXZf/image.jpg')"><img src="https://i.ibb.co/RT67QXZf/image.jpg"></div>
        </div>
        <footer>
            Stavitskii PRO — сделано для людей | 2026
        </footer>
    </div>
    
    <div class="side-image animate__animated animate__fadeInRight"></div>
    <div id="modal" onclick="closeModal()">
        <img id="modalImg" src="">
    </div>
    <script>
        const m = document.getElementById('modal');
        function openModal(s) { 
            document.getElementById('modalImg').src = s; 
            m.classList.add('active'); 
        }
        function closeModal() { m.classList.remove('active'); }
    </script>
</body>
</html>
