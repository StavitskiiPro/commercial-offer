<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stavitskii PRO | Proposal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: #eee; display: flex; min-height: 100vh; background: #050505; flex-direction: row; }
        
        .main-wrapper { flex: 1; padding: 4vw; max-width: 900px; }
        .side-image { 
            width: 35%; 
            background: url('https://i.ibb.co/Q3YWcLTs/image.jpg') no-repeat center top; 
            background-size: cover; 
            position: sticky; 
            top: 0; 
            height: 100vh; 
        }
        @media (max-width: 900px) { 
            body { flex-direction: column; } 
            .side-image { 
                width: 100%; height: 350px; order: -1; 
                background-size: contain; background-color: #000; 
            } 
        }
        .hero h1 { font-size: clamp(30px, 8vw, 50px); color: #fff; margin-bottom: 20px; }
        .hero h1 span { color: #00ffc3; }
        .table-section { background: rgba(20,20,20,0.8); border: 1px solid #333; border-radius: 15px; padding: 20px; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; }
        tr { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #1a1a1a; flex-wrap: wrap; }
        .price-col { font-weight: 700; color: #00ffc3; margin-top: 5px; }
        .desc-text { font-size: 12px; color: #888; display: block; }
        
        .total-row { background: rgba(0, 255, 195, 0.05); padding: 15px; border-radius: 10px; margin-top: 10px; }
        .pulse-text { animation: pulse 2s infinite; color: #00ffc3; }
        @keyframes pulse { 0% { text-shadow: 0 0 0px #00ffc3; } 50% { text-shadow: 0 0 10px #00ffc3; } 100% { text-shadow: 0 0 0px #00ffc3; } }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .mat-card { 
            background: #0a0a0a; border-radius: 12px; border: 1px solid #222; 
            text-decoration: none; color: inherit; display: block; transition: 0.3s;
        }
        .mat-card:hover { border-color: #00ffc3; transform: translateY(-5px); }
        .mat-card img { width: 100%; height: 120px; object-fit: contain; }
        .card-label { padding: 8px; text-align: center; font-size: 11px; }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="hero">
            <h1>Stavitskii <span>PRO</span></h1>
            <p>Комплексные интерьерные решения</p>
        </div>
        <div class="table-section">
            <table>
                <tr><td><strong>Лайтбокс</strong><span class="desc-text">ПВХ, LED-периметр.</span></td><td class="price-col">308 000 ₽</td></tr>
                <tr><td><strong>Столы (2 шт.)</strong><span class="desc-text">Дизайнерский сет.</span></td><td class="price-col">517 500 ₽</td></tr>
                <tr><td><strong>Санузел Set</strong><span class="desc-text">Акрил (раковина/полка).</span></td><td class="price-col">225 500 ₽</td></tr>
                <tr><td><strong>Бар</strong><span class="desc-text">Кварц «Алмазы Якутии».</span></td><td class="price-col">324 500 ₽</td></tr>
                <tr><td><strong>Декор</strong><span class="desc-text">Патинированная сталь.</span></td><td class="price-col">368 500 ₽</td></tr>
                <tr class="total-row"><td><strong>ИТОГО</strong></td><td class="pulse-text">1 743 500 ₽</td></tr>
            </table>
        </div>
        <div class="cards-grid">
            <a href="https://i.ibb.co/xtB3s4fc/1.jpg" target="_blank" class="mat-card"><img src="https://i.ibb.co/xtB3s4fc/1.jpg" loading="lazy"><div class="card-label">Лайтбокс</div></a>
            <a href="https://i.ibb.co/MyGzPMDC/21.png" target="_blank" class="mat-card"><img src="https://i.ibb.co/MyGzPMDC/21.png" loading="lazy"><div class="card-label">Столы</div></div></a>
            <a href="https://i.ibb.co/7JwjC6dk/image.jpg" target="_blank" class="mat-card"><img src="https://i.ibb.co/7JwjC6dk/image.jpg" loading="lazy"><div class="card-label">Раковина</div></a>
            <a href="https://i.ibb.co/bgRBLs3w/image.jpg" target="_blank" class="mat-card"><img src="https://i.ibb.co/bgRBLs3w/image.jpg" loading="lazy"><div class="card-label">Полка</div></a>
            <a href="https://i.ibb.co/RT67QXZf/image.jpg" target="_blank" class="mat-card"><img src="https://i.ibb.co/RT67QXZf/image.jpg" loading="lazy"><div class="card-label">Сталь</div></a>
        </div>
    </div>
    <div class="side-image"></div>
</body>
</html>
